
roles:
  - role: PM_TECH_LEAD
    description: "Owns planning, coordination, and overall delivery gating."
    default_memory_scopes: ["project", "decision", "dod"]
    allowed_action_categories: ["plan", "summarize", "assign", "evaluate_dod"]

  - role: SOLUTION_ARCHITECT
    description: "Designs API contracts, system components, and architectural records."
    default_memory_scopes: ["project", "decision", "contract"]
    allowed_action_categories: ["design", "review", "publish_contract"]

  - role: BACKEND_DEVELOPER
    description: "Writes backend logic, code modules, databases, and structural asserts."
    default_memory_scopes: ["project", "backend", "contract", "decision"]
    allowed_action_categories: ["implement", "test", "publish_artifact"]

  - role: FRONTEND_DEVELOPER
    description: "Crafts client application elements, layout systems, and views."
    default_memory_scopes: ["project", "frontend", "contract", "decision"]
    allowed_action_categories: ["implement", "test", "publish_artifact"]

  - role: PLATFORM_ENGINEER
    description: "Builds Docker wrappers, sandboxes, and integration lifecycles."
    default_memory_scopes: ["project", "platform", "decision"]
    allowed_action_categories: ["configure", "test", "publish_artifact"]

  - role: QA_ENGINEER
    description: "Asserts acceptance criteria and collects delivery execution proof."
    default_memory_scopes: ["project", "qa", "contract", "dod"]
    allowed_action_categories: ["test", "verify", "publish_report"]

  - role: SECURITY_REVIEWER
    description: "Inspects logic paths for vulnerabilities or safety boundary violations."
    default_memory_scopes: ["project", "security", "decision"]
    allowed_action_categories: ["review", "block", "quarantine_recommendation"]

# Used only if the LLM bootstrap call fails and create_team_plan() must fall back
# to a deterministic minimal team instead of crashing the whole run.
fallback_team:
  project_name: "emergency-fallback-project"
  dod:
    - "Code base executes"
    - "Verify output standards"
  assumptions:
    - "Fallback mode active"
  agents:
    - role: PM_TECH_LEAD
      count: 1
      description: "Fallback coordinator"