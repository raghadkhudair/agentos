ray:
  num_cpus: 1                                # Dynamically limits cores to protect memory
  object_store_memory:   100000000           
  gcs_rpc_server_reconnect_timeout_s: 60

watchdog_loop:
  interval_seconds: 30

agent_inbox_loop:
  pubsub_poll_timeout_seconds: 1.0
  empty_inbox_sleep_seconds: 0.1
  error_backoff_sleep_seconds: 1.0

models:
  primary: "gemini/gemini-3.5-flash"
  fallback: "gemini/gemini-pro-latest"
  embedding: "gemini/gemini-embedding-001"

agent_limits:
  max_agents_total: 2                       
  max_active_agents: 2
  max_threads_per_agent: 2  

embedding:
  dimension: 768