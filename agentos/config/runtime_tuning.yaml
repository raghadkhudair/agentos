schema_version: 2

ray:
  dashboard_enabled: false
  health_check_interval_seconds: 15
  actor_restart_limit: 5

watchdog_loop:
  interval_seconds: 30

agent_inbox_loop:
  stream_block_milliseconds: 1000
  batch_size: 10
  error_backoff_seconds: 1.0
  processing_lease_seconds: 120

collaboration:
  interval_seconds: ${AGENTOS_COLLABORATION_INTERVAL_SECONDS:-30}
  summary_every_actions: 5
  event_stream_max_length: 100000
  inbox_max_length: 10000

memory:
  recent_event_limit: 20
  recent_midterm_limit: 20
  semantic_result_limit: 8
  max_prompt_memory_characters: 16000
  long_term_promotion_importance: 3

provider:
  initial_budget_reservation_usd: 0.25
  circuit_breaker_failure_threshold: 3
  circuit_breaker_recovery_seconds: 120

execution:
  command_timeout_seconds: 120
  max_output_characters: 100000
  allowed_executables: [python, python3, pytest, ruff, mypy, npm, npx, node, git]
  allowed_sandbox_images:
    - python:3.12.11-slim-bookworm
    - node:22.17.0-bookworm-slim
