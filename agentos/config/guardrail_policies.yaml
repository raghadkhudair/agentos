# Governance/security configuration used by:
#   - governance/policy_engine.py  -> PolicyEngine.DESTRUCTIVE_PATTERNS + action_type risk sets
#   - provider/gateway.py          -> ProviderGateway._sanitize_prompt_input patterns
#   - execution/supervisor.py      -> git identity + shell timeout

destructive_patterns:
  - "drop database"
  - "drop schema"
  - "drop table"
  - "truncate"
  - "delete from"
  - "rm -rf"
  - "disable guardrail"
  - "delete audit"
  - "delete checkpoint"
  - "delete event log"
  - "curl | sh"
  - "wget | sh"
  - "delete repository"
  - "expose secret"
  - "modify provider key"
  - "deploy to production"
  - "delete migration history"
  - "remove backup"
  - "modify production"
  - "sudo"
  - "chmod"
  - "chown"
  - "disable logs"
  - "disable logging"
  - "access host secrets"

controlled_command_keywords:
  - "npm install"
  - "pip install"
  - "poetry add"
  - "docker build"
  - "docker compose"
  - "docker-compose"
  - "run_migration"

require_review_action_types:
  - "modify_auth"
  - "modify_ci"
  - "run_migration"
  - "add_dependency"
  - "modify_docker"

require_security_review_action_types:
  - "modify_auth"
  - "change_encryption"

require_backup_action_types:
  - "run_migration"
  - "wipe_cache"

sandbox_only_action_types:
  - "shell_command"
  - "run_command"

medium_risk_shell_action_types:
  - "shell_command"
  - "run_command"
  - "edit_file"
  - "create_branch"
  - "update_documentation"
  - "publish_artifact"

low_risk_action_types:
  - "read_file"
  - "write_file"
  - "write_code"
  - "run_tests"
  - "create_summary"
  - "search_memory"


filesystem_safety:
  blocked_global_paths:
    - ".env"
    - "schema.sql"
    - "guardrail_policies.yaml"
    - "settings.py"
    - "secrets"
    - "logs"
    - "provider_keys"
    - "audit_logs"
    - "checkpoints"
    - ".github/workflows"
    - ".gitlab-ci.yml"
    - "docker.sock"
    - "policy_engine.py"


safety_watchdog:
  blocked_call_quarantine_threshold: 5   # violations before agent gets quarantined

stagnation_watchdog:
  checkpoint_history_lookback: 10
  repeated_action_threshold: 4
  staleness_seconds: 300
  
prompt_sanitization_patterns:
  - '\.env'
  - 'ignore\s+previous\s+instructions'
  - 'disable\s+guardrails'
  - 'system_policies'

execution_sandbox:
  git_author_name: "AgentOS"
  git_author_email: "runtime@agentos.local"
  default_branch: "main"
  shell_command_timeout_seconds: 30.0